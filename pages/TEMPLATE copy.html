  <style>
    /* ── Language switcher ─────────────────────────────────────────── */
    .lang-switcher {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .lang-switcher summary {
      list-style: none;
      cursor: pointer;
      font-size: .8rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      opacity: .75;
      user-select: none;
    }
    .lang-switcher summary::-webkit-details-marker { display: none; }
    .lang-switcher summary::after { content: " ▾"; }
    .lang-switcher[open] summary::after { content: " ▴"; }
    .lang-list {
      position: absolute;
      top: calc(100% + .5rem);
      right: 0;
      background: var(--color-surface, #fff);
      border: 1px solid var(--color-border, #ddd);
      border-radius: .4rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      min-width: 9rem;
      z-index: 999;
      padding: .35rem 0;
    }
    .lang-list button {
      display: flex;
      align-items: center;
      gap: .5rem;
      width: 100%;
      padding: .4rem .8rem;
      border: none;
      background: none;
      cursor: pointer;
      font-size: .85rem;
      text-align: left;
      transition: background .15s;
    }
    .lang-list button:hover { background: var(--color-hover, #f5f5f5); }
    .lang-list button.active { font-weight: 700; }
    .lang-list button .lang-native { opacity: .55; font-size: .75rem; }
    /* Loading flash */
    body.i18n-loading { opacity: 0; transition: opacity .2s; }
    body.i18n-ready   { opacity: 1; transition: opacity .25s; }
  </style>
</head>
