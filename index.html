<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadows within the Cave — Thoughts about the Past of the Future Us</title>
  <meta name="description" content="A personal journal of essays ranging from philosophy to science fiction, published four times a year." />
  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="assets/index.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='100'>👻</text></svg>">

  <style>
    /* ── Language Switcher ───────────────────────────────────── */
    .lang-switcher {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .lang-switcher-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: inherit;
      padding: 0.3rem 0.65rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .lang-switcher-btn:hover,
    .lang-switcher-btn[aria-expanded="true"] {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.08);
    }
    .lang-switcher-btn svg {
      flex-shrink: 0;
      opacity: 0.85;
    }
    .lang-switcher-btn .lang-caret {
      opacity: 0.6;
      font-size: 0.65rem;
      margin-left: 0.1rem;
      transition: transform 0.2s;
    }
    .lang-switcher-btn[aria-expanded="true"] .lang-caret {
      transform: rotate(180deg);
    }

    /* Dropdown panel */
    .lang-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 0.5rem;
      padding: 0.4rem 0;
      min-width: 13rem;
      max-height: 20rem;
      overflow-y: auto;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);

      /* Two-column grid */
      display: none;
      grid-template-columns: 1fr 1fr;
    }
    .lang-dropdown.open {
      display: grid;
    }

    .lang-option {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: rgba(255,255,255,0.75);
      padding: 0.45rem 0.9rem;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .lang-option:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }
    .lang-option.active {
      color: #fff;
      font-weight: 600;
    }

    /* Masthead layout tweak to accommodate switcher */
    .masthead .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .masthead-left {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>
<body>

  <!-- Masthead -->
  <header class="masthead">
    <div class="container">
      <div class="masthead-left">
        <h1 class="masthead-title" id="masthead-title"><em>Shadows within the Cave</em></h1>
        <p class="masthead-tagline" id="masthead-tagline">
          Thoughts about the Past of the Future Us &ensp;·&ensp; Four Essays guaranteed per year &ensp;·&ensp; One essay per quarter
        </p>
      </div>

      <!-- Language Switcher -->
      <div class="lang-switcher" id="lang-switcher">
        <button
          class="lang-switcher-btn"
          id="lang-switcher-btn"
          aria-haspopup="listbox"
          aria-expanded="false"
          aria-label="Select language"
        >
          <!-- Globe icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span id="lang-label">English</span>
          <span class="lang-caret">▼</span>
        </button>
        <div class="lang-dropdown" id="lang-dropdown" role="listbox" aria-label="Language options">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </header>

  <!-- Issue strip -->
  <div class="issue-bar">
    <span id="issue-label">Loading…</span>
  </div>

  <!-- Main -->
  <main class="container py-4">

    <!-- Filter row -->
    <div class="filter-row mb-4 d-flex flex-wrap align-items-center">
      <span class="filter-label" id="filter-label">Topics</span>
      <button class="topic-pill active" data-topic="All" id="pill-all">All</button>
      <!-- <button class="topic-pill" data-topic="History" id="pill-history">History</button> -->
      <button class="topic-pill" data-topic="Philosophy" id="pill-philosophy">Philosophy</button>
      <!-- <button class="topic-pill" data-topic="Science" id="pill-science">Science</button> -->
      <button class="topic-pill" data-topic="Science Fiction" id="pill-scifi">Science Fiction</button>
    </div>

    <div class="row g-5">
      <!-- Feed -->
      <div class="col-lg-8">
        <!-- Featured slot -->
        <div class="featured-block" id="featured-block"></div>
        <!-- Article list (grouped by issue) -->
        <div id="article-list"></div>
        <div class="no-results" id="no-results">No articles in this topic yet</div>
        <!-- Show all / archive toggle -->
        <div class="show-more-wrap" id="show-more-wrap" style="display:none">
          <button class="show-more-btn" id="show-more-btn">Show all essays</button>
        </div>
      </div>

      <!-- Sidebar -->
      <aside class="col-lg-4">
        <div class="sidebar-section">
          <p class="sidebar-heading" id="sidebar-recent-heading">Recent essays</p>
          <div id="sidebar-list"></div>
        </div>

        <div class="sidebar-section">
          <p class="sidebar-heading" id="sidebar-about-heading">About this journal</p>
          <p class="about-text" id="about-text"></p>
        </div>
      </aside>
    </div>
  </main>

  <footer>
    <div class="container">
      <p><span id="footer-title">Shadows within the Cave</span> &ensp;·&ensp; <span id="footer-year"></span></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Load order matters: translations → articles → i18n boot → index.js -->
  <script src="assets/translations.js"></script>
  <script src="assets/articles.js"></script>
  <script src="assets/i18n.js"></script>
  <!-- index.js loads last: t() and EU_LANGUAGES are already defined above -->
  <script src="assets/index.js"></script>
</body>
</html>
