<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadows within the Cave — Thoughts about the Past of the Future Us</title>
  <meta name="description" content="A personal journal of essays ranging from philosophy to science fiction, published four times a year." />
  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="assets/index.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='100'>👻</text></svg>">

  <style>
    /* ── Language Bar (collapsed by default; toggle reveals flags) ── */
    .lang-bar {
      border-bottom: 1px solid var(--rule);
      padding: 0.5rem 0;
      text-align: center;
    }
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 0.28rem 0.7rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      transition: all 0.2s;
    }
    .lang-toggle:hover,
    .lang-toggle[aria-expanded="true"] {
      color: var(--ink);
      border-color: var(--ink);
    }
    .lang-toggle svg { flex-shrink: 0; opacity: 0.8; }
    .lang-toggle img {
      width: 18px;
      height: 13px;
      object-fit: cover;
      border-radius: 1px;
      display: block;
    }
    .lang-toggle .lang-caret {
      font-size: 0.6rem;
      transition: transform 0.2s;
    }
    .lang-toggle[aria-expanded="true"] .lang-caret {
      transform: rotate(180deg);
    }
    .lang-grid {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.45rem 0.5rem;
      margin-top: 0.75rem;
    }
    .lang-grid.open {
      display: flex;
    }
    .lang-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 0.28rem 0.6rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .lang-chip:hover {
      color: var(--ink);
      border-color: var(--ink);
    }
    .lang-chip.active {
      color: var(--paper);
      background: var(--ink);
      border-color: var(--ink);
    }
    .lang-chip img {
      width: 20px;
      height: 15px;
      object-fit: cover;
      display: block;
      border-radius: 1px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Masthead -->
  <header class="masthead">
    <div class="container">
      <h1 class="masthead-title" id="masthead-title"><em>Shadows within the Cave</em></h1>
      <p class="masthead-tagline" id="masthead-tagline">
        Thoughts about the Past of the Future Us &ensp;·&ensp; Four Essays guaranteed per year &ensp;·&ensp; One essay per quarter
      </p>
    </div>
  </header>

  <!-- Language Bar -->
  <nav class="lang-bar" aria-label="Select language">
    <div class="container">
      <button class="lang-toggle" id="lang-toggle" aria-expanded="false" aria-controls="lang-grid">
        <!-- Globe icon -->
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <img id="lang-current-flag" src="" width="18" height="13" alt="" />
        <span id="lang-current-name">English</span>
        <span class="lang-caret">▼</span>
      </button>
      <div class="lang-grid" id="lang-grid" role="listbox">
        <!-- Populated by JS -->
      </div>
    </div>
  </nav>

  <!-- Issue strip -->
  <div class="issue-bar">
    <span id="issue-label">Loading…</span>
  </div>

  <!-- Main -->
  <main class="container py-4">

    <div class="row g-5">
      <!-- Feed -->
      <div class="col-lg-8">
        <!-- Featured slot -->
        <div class="featured-block" id="featured-block"></div>
        <!-- Article list (grouped by issue) -->
        <div id="article-list"></div>
        <!-- Show all / archive toggle -->
        <div class="show-more-wrap" id="show-more-wrap" style="display:none">
          <button class="show-more-btn" id="show-more-btn">Show all essays</button>
        </div>
      </div>

      <!-- Sidebar -->
      <aside class="col-lg-4">
        <div class="sidebar-section">
          <p class="sidebar-heading" id="sidebar-recent-heading">Recent essays</p>
          <div id="sidebar-list"></div>
        </div>

        <div class="sidebar-section">
          <p class="sidebar-heading" id="sidebar-about-heading">About this journal</p>
          <p class="about-text" id="about-text"></p>
        </div>
      </aside>
    </div>
  </main>

  <footer>
    <div class="container">
      <p><span id="footer-title">Shadows within the Cave</span> &ensp;·&ensp; <span id="footer-year"></span></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Load order matters: translations → articles → i18n boot → index.js -->
  <script src="assets/translations.js"></script>
  <script src="assets/articles.js"></script>
  <script src="assets/i18n.js"></script>
  <!-- index.js loads last: t() and EU_LANGUAGES are already defined above -->
  <script src="assets/index.js"></script>
</body>
</html>
